<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TPN 行事曆</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const app = initializeApp({ databaseURL:"https://tpn-calendar-bc4a7-default-rtdb.asia-southeast1.firebasedatabase.app/" });
  const db = getDatabase(app);
  window._db=db; window._ref=ref; window._onValue=onValue; window._set=set; window._remove=remove;
  window._firebaseReady=true;
  window.dispatchEvent(new Event("firebaseReady"));
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;background:#eef4fb;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#dde8f5;}
  ::-webkit-scrollbar-thumb{background:#a8c4e0;border-radius:4px;}
  textarea,input{outline:none;font-family:inherit;}
  button{font-family:inherit;cursor:pointer;}

  /* Week grid */
  .week-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    flex:1;
    overflow-y:auto;
    border-top:1px solid #ccddf0;
  }
  .day-col{
    border-right:1px solid #ccddf0;
    display:flex;
    flex-direction:column;
    background:#fff;
    min-height:0;
  }
  .day-col:last-child{border-right:none;}
  .day-col.sat .day-hdr{color:#2563eb;}
  .day-col.sun .day-hdr{color:#dc2626;}
  .day-col.today-col{background:#ebf5ff;}
  .day-col.today-col .day-hdr-wrap{background:#1a6fb5;}
  .day-col.today-col .day-hdr{color:#fff !important;}
  .day-col.today-col .day-num{background:#fff;color:#1a6fb5;border-radius:50%;
    width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;}

  .day-hdr-wrap{
    background:#f0f6ff;
    border-bottom:1px solid #ccddf0;
    padding:8px 10px 6px;
    display:flex;
    flex-direction:column;
    align-items:center;
    flex-shrink:0;
  }
  .day-hdr{font-weight:800;font-size:17px;color:#334155;line-height:1;}
  .day-num{font-weight:700;font-size:26px;color:#1e3a5f;line-height:1;margin-top:3px;}
  .day-col.sat .day-num{color:#2563eb;}
  .day-col.sun .day-num{color:#dc2626;}

  .day-events{
    flex:1;
    padding:8px 8px 12px;
    display:flex;
    flex-direction:column;
    gap:5px;
    overflow-y:auto;
    cursor:pointer;
  }
  .day-events:hover{background:#f8fbff;}

  .event-chip{
    border-radius:7px;
    padding:6px 10px;
    font-size:17px;
    font-weight:600;
    color:#fff;
    line-height:1.4;
    cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,0.12);
    word-break:break-all;
    position:relative;
  }
  .event-chip:hover{filter:brightness(0.93);}

  .add-hint{
    font-size:13px;
    color:#b0c4d8;
    text-align:center;
    margin-top:4px;
    user-select:none;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const WEEKDAYS = ["一","二","三","四","五","六","日"];
const WD_CLASS = {"六":"sat","日":"sun"};
const COLORS   = ["#1976D2","#00897B","#F57C00","#C62828","#6A1B9A","#AD1457"];
const PRIORITY = {
  urgent:   {label:"緊急",color:"#dc2626",bg:"#fee2e2"},
  important:{label:"重要",color:"#d97706",bg:"#fef3c7"},
  normal:   {label:"一般",color:"#1976D2",bg:"#dbeafe"},
};

/* ── Date helpers ─────────────────────────────────────────────────────── */
function startOfWeek(date){
  // Monday = 0
  const d = new Date(date);
  const dow = (d.getDay()+6)%7;
  d.setDate(d.getDate()-dow);
  d.setHours(0,0,0,0);
  return d;
}
function addDays(date,n){
  const d=new Date(date); d.setDate(d.getDate()+n); return d;
}
function fmtKey(date){
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function fmtMonthLabel(weekStart){
  const weekEnd = addDays(weekStart,6);
  const sy=weekStart.getFullYear(), sm=weekStart.getMonth()+1;
  const ey=weekEnd.getFullYear(),   em=weekEnd.getMonth()+1;
  if(sy===ey && sm===em) return `${sy} 年 ${sm} 月`;
  if(sy===ey) return `${sy} 年 ${sm}–${em} 月`;
  return `${sy}/${sm} – ${ey}/${em}`;
}
function getWeekdayIdx(date){ return (date.getDay()+6)%7; }

/* ── Firebase ─────────────────────────────────────────────────────────── */
function fbSet(p,d){if(window._db)window._set(window._ref(window._db,p),d);}
function fbRemove(p){if(window._db)window._remove(window._ref(window._db,p));}
function fbListen(p,cb){
  if(!window._db)return()=>{};
  return window._onValue(window._ref(window._db,p),s=>cb(s.val()));
}

/* ── Modal ────────────────────────────────────────────────────────────── */
function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",
      justifyContent:"center",background:"rgba(10,40,80,0.35)"}}>
      <div style={{background:"#fff",border:"1.5px solid #ccddf0",borderRadius:16,
        minWidth:330,maxWidth:440,width:"93vw",boxShadow:"0 8px 40px rgba(20,80,160,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"16px 22px 12px",borderBottom:"1px solid #ccddf0"}}>
          <span style={{fontWeight:700,fontSize:18,color:"#1e3a5f"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",fontSize:24,lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:"18px 22px 22px"}}>{children}</div>
      </div>
    </div>
  );
}

function ColorPicker({value,onChange}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <span style={{color:"#64748b",fontSize:15}}>顏色：</span>
      {COLORS.map(c=>(
        <div key={c} onClick={()=>onChange(c)}
          style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",flexShrink:0,
            border:value===c?"3px solid #1a6fb5":"2.5px solid #e2e8f0"}}/>
      ))}
    </div>
  );
}

/* ── EventChip ────────────────────────────────────────────────────────── */
function EventChip({event,onEdit,onDelete}){
  const [menu,setMenu]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!menu)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setMenu(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[menu]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div className="event-chip"
        style={{background:event.color||COLORS[0]}}
        onClick={e=>{e.stopPropagation();setMenu(v=>!v);}}>
        {event.text}
        {event.isRecurring&&<span style={{fontSize:11,opacity:.7,marginLeft:4}}>(固)</span>}
      </div>
      {menu&&(
        <div style={{position:"absolute",top:"100%",left:0,zIndex:200,background:"#fff",
          border:"1px solid #ccddf0",borderRadius:10,boxShadow:"0 4px 20px rgba(20,80,160,0.15)",
          minWidth:130,marginTop:2}}>
          {!event.isRecurring&&<>
            <button onClick={()=>{setMenu(false);onEdit(event);}}
              style={{display:"block",width:"100%",padding:"11px 16px",background:"none",border:"none",
                color:"#1e3a5f",textAlign:"left",fontSize:15,borderBottom:"1px solid #e8f0fa"}}>✏️ 再編輯</button>
            <button onClick={()=>{setMenu(false);onDelete(event.id);}}
              style={{display:"block",width:"100%",padding:"11px 16px",background:"none",border:"none",
                color:"#dc2626",textAlign:"left",fontSize:15,borderBottom:"1px solid #e8f0fa"}}>🗑️ 刪除</button>
          </>}
          <button onClick={()=>setMenu(false)}
            style={{display:"block",width:"100%",padding:"8px 16px",background:"none",border:"none",
              color:"#94a3b8",textAlign:"left",fontSize:13}}>關閉</button>
        </div>
      )}
    </div>
  );
}

/* ── DayColumn ────────────────────────────────────────────────────────── */
function DayColumn({date,events,recurringEvents,onAddClick,onEdit,onDelete}){
  const today=new Date(); today.setHours(0,0,0,0);
  const isToday=date.getTime()===today.getTime();
  const wdIdx=getWeekdayIdx(date);
  const wd=WEEKDAYS[wdIdx];
  const wdCls=WD_CLASS[wd]||"";
  const key=fmtKey(date);
  const manual=Object.entries(events[key]||{}).map(([id,v])=>({id,...v}));
  const rec=Object.entries(recurringEvents||{})
    .map(([id,v])=>({id,...v}))
    .filter(r=>r.weekday===wd)
    .map(r=>({...r,id:`rec-${r.id}`,isRecurring:true}));
  const allEvs=[...rec,...manual];

  return(
    <div className={`day-col ${wdCls} ${isToday?"today-col":""}`}>
      <div className="day-hdr-wrap">
        <div className="day-hdr">{wd}</div>
        <div className="day-num">{isToday
          ?<span className="day-num">{date.getDate()}</span>
          :date.getDate()}</div>
        <div style={{fontSize:12,color:isToday?"rgba(255,255,255,0.8)":"#94a3b8",marginTop:2}}>
          {date.getMonth()+1}/{date.getDate()}
        </div>
      </div>
      <div className="day-events" onClick={()=>onAddClick(date)}>
        {allEvs.map(ev=>(
          <EventChip key={ev.id} event={ev}
            onEdit={e=>{onEdit(e,date);}}
            onDelete={id=>onDelete(date,id)}/>
        ))}
        {allEvs.length===0&&<div className="add-hint">點擊新增</div>}
      </div>
    </div>
  );
}

/* ── CalendarTab (週視圖) ─────────────────────────────────────────────── */
function CalendarTab({events,recurringEvents}){
  const today=new Date(); today.setHours(0,0,0,0);
  const [weekStart,setWeekStart]=useState(()=>startOfWeek(today));
  const [addModal,setAddModal]=useState(null);  // {date}
  const [editModal,setEditModal]=useState(null); // {event,date}
  const [inputText,setInputText]=useState("");
  const [inputColor,setInputColor]=useState(COLORS[0]);

  const days=Array.from({length:7},(_,i)=>addDays(weekStart,i));

  const goToday=()=>setWeekStart(startOfWeek(today));
  const prevWeek=()=>setWeekStart(d=>addDays(d,-7));
  const nextWeek=()=>setWeekStart(d=>addDays(d,7));

  const handleAddSave=()=>{
    if(!inputText.trim())return;
    const key=fmtKey(addModal.date);
    fbSet(`events/${key}/${Date.now()}`,{text:inputText.trim(),color:inputColor});
    setAddModal(null); setInputText(""); setInputColor(COLORS[0]);
  };
  const handleEditSave=()=>{
    if(!inputText.trim())return;
    const key=fmtKey(editModal.date);
    fbSet(`events/${key}/${editModal.event.id}`,{text:inputText.trim(),color:inputColor});
    setEditModal(null); setInputText(""); setInputColor(COLORS[0]);
  };
  const handleDelete=(date,id)=>{
    fbRemove(`events/${fmtKey(date)}/${id}`);
  };
  const openAdd=date=>{
    setAddModal({date}); setInputText(""); setInputColor(COLORS[0]);
  };
  const openEdit=(event,date)=>{
    setEditModal({event,date}); setInputText(event.text); setInputColor(event.color||COLORS[0]);
  };

  const monthLabel=fmtMonthLabel(weekStart);
  const weekEnd=addDays(weekStart,6);
  const weekLabel=`${weekStart.getMonth()+1}/${weekStart.getDate()} – ${weekEnd.getMonth()+1}/${weekEnd.getDate()}`;

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      {/* Nav bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 18px",
        background:"#fff",borderBottom:"1px solid #ccddf0",flexShrink:0}}>
        <button onClick={prevWeek}
          style={{background:"#e8eef5",border:"none",color:"#1e3a5f",borderRadius:8,
            padding:"6px 16px",fontSize:20,fontWeight:700}}>‹</button>
        <div style={{textAlign:"center",minWidth:200}}>
          <div style={{fontWeight:800,fontSize:20,color:"#1e3a5f"}}>{monthLabel}</div>
          <div style={{fontSize:14,color:"#64748b",marginTop:1}}>{weekLabel}</div>
        </div>
        <button onClick={nextWeek}
          style={{background:"#e8eef5",border:"none",color:"#1e3a5f",borderRadius:8,
            padding:"6px 16px",fontSize:20,fontWeight:700}}>›</button>
        <button onClick={goToday}
          style={{marginLeft:"auto",background:"#1a6fb5",border:"none",color:"#fff",
            borderRadius:8,padding:"7px 20px",fontSize:15,fontWeight:700}}>本週</button>
      </div>

      {/* 7-column week grid */}
      <div className="week-grid">
        {days.map((date,i)=>(
          <DayColumn key={i} date={date}
            events={events} recurringEvents={recurringEvents}
            onAddClick={openAdd}
            onEdit={openEdit}
            onDelete={handleDelete}/>
        ))}
      </div>

      {/* Add Modal */}
      {addModal&&(
        <Modal title={`新增事項 — ${addModal.date.getMonth()+1}/${addModal.date.getDate()}`}
          onClose={()=>setAddModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <textarea autoFocus value={inputText} onChange={e=>setInputText(e.target.value)}
              placeholder="輸入事項..." rows={3}
              style={{background:"#f5f8fc",border:"1px solid #b0c8e0",borderRadius:10,color:"#1e3a5f",
                padding:"10px 12px",fontSize:16,resize:"none",width:"100%"}}/>
            <ColorPicker value={inputColor} onChange={setInputColor}/>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setAddModal(null)}
                style={{background:"#e8eef5",border:"none",color:"#374151",borderRadius:9,padding:"9px 20px",fontSize:15}}>取消</button>
              <button onClick={handleAddSave}
                style={{background:"#1a6fb5",border:"none",color:"#fff",borderRadius:9,padding:"9px 20px",fontSize:15,fontWeight:700}}>新增</button>
            </div>
          </div>
        </Modal>
      )}

      {/* Edit Modal */}
      {editModal&&(
        <Modal title={`編輯事項 — ${editModal.date.getMonth()+1}/${editModal.date.getDate()}`}
          onClose={()=>setEditModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <textarea autoFocus value={inputText} onChange={e=>setInputText(e.target.value)} rows={3}
              style={{background:"#f5f8fc",border:"1px solid #b0c8e0",borderRadius:10,color:"#1e3a5f",
                padding:"10px 12px",fontSize:16,resize:"none",width:"100%"}}/>
            <ColorPicker value={inputColor} onChange={setInputColor}/>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setEditModal(null)}
                style={{background:"#e8eef5",border:"none",color:"#374151",borderRadius:9,padding:"9px 20px",fontSize:15}}>取消</button>
              <button onClick={handleEditSave}
                style={{background:"#1a6fb5",border:"none",color:"#fff",borderRadius:9,padding:"9px 20px",fontSize:15,fontWeight:700}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── RecurringTab ─────────────────────────────────────────────────────── */
function RecurringTab({recurringEvents}){
  const [addModal,setAddModal]=useState(false);
  const [editModal,setEditModal]=useState(null);
  const [form,setForm]=useState({weekday:"一",text:"",color:COLORS[0]});
  const items=Object.entries(recurringEvents||{}).map(([id,v])=>({id,...v}));
  const handleSave=isEdit=>{
    if(!form.text.trim())return;
    if(isEdit){fbSet(`recurring/${editModal.id}`,form);setEditModal(null);}
    else{fbSet(`recurring/${Date.now()}`,{...form});setAddModal(false);}
    setForm({weekday:"一",text:"",color:COLORS[0]});
  };
  return(
    <div style={{padding:24,height:"100%",overflowY:"auto",background:"#f4f8fd"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={{fontWeight:800,fontSize:22,color:"#1e3a5f"}}>固定週期事項</div>
          <div style={{fontSize:15,color:"#64748b",marginTop:3}}>設定每週固定重複出現在行事曆的事項</div>
        </div>
        <button onClick={()=>{setAddModal(true);setForm({weekday:"一",text:"",color:COLORS[0]});}}
          style={{background:"#1a6fb5",border:"none",color:"#fff",borderRadius:10,padding:"10px 20px",fontWeight:700,fontSize:16}}>+ 新增</button>
      </div>
      {items.length===0&&<div style={{textAlign:"center",color:"#94a3b8",padding:"50px 0",fontSize:17}}>尚無固定事項</div>}
      {["一","二","三","四","五","六","日"].map(wd=>{
        const group=items.filter(r=>r.weekday===wd);
        if(!group.length)return null;
        const wdColor={"六":"#2563eb","日":"#dc2626"}[wd]||"#1a6fb5";
        return(
          <div key={wd} style={{marginBottom:16}}>
            <div style={{fontWeight:800,fontSize:16,color:wdColor,marginBottom:8}}>每週 {wd}</div>
            {group.map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,background:"#fff",
                borderRadius:10,padding:"12px 16px",marginBottom:8,boxShadow:"0 1px 4px rgba(20,80,160,0.08)"}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:r.color,flexShrink:0}}/>
                <span style={{flex:1,color:"#1e3a5f",fontSize:17,fontWeight:500}}>{r.text}</span>
                <button onClick={()=>{setEditModal(r);setForm({weekday:r.weekday,text:r.text,color:r.color});}}
                  style={{background:"#e8eef5",border:"none",color:"#1e3a5f",borderRadius:7,padding:"5px 12px",fontSize:14}}>編輯</button>
                <button onClick={()=>fbRemove(`recurring/${r.id}`)}
                  style={{background:"none",border:"none",color:"#dc2626",fontSize:20}}>✕</button>
              </div>
            ))}
          </div>
        );
      })}
      {(addModal||editModal)&&(
        <Modal title={editModal?"編輯固定事項":"新增固定事項"} onClose={()=>{setAddModal(false);setEditModal(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <div style={{fontSize:15,color:"#64748b",marginBottom:8}}>星期</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {["一","二","三","四","五","六","日"].map(wd=>(
                  <button key={wd} onClick={()=>setForm(f=>({...f,weekday:wd}))}
                    style={{background:form.weekday===wd?"#1a6fb5":"#e8eef5",border:"none",
                      color:form.weekday===wd?"#fff":"#1e3a5f",borderRadius:8,padding:"7px 14px",
                      fontWeight:form.weekday===wd?700:400,fontSize:16}}>{wd}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:15,color:"#64748b",marginBottom:8}}>事項內容</div>
              <input autoFocus value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
                placeholder="輸入事項..."
                style={{width:"100%",background:"#f5f8fc",border:"1px solid #b0c8e0",borderRadius:10,
                  color:"#1e3a5f",padding:"10px 12px",fontSize:16}}/>
            </div>
            <ColorPicker value={form.color} onChange={c=>setForm(f=>({...f,color:c}))}/>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>{setAddModal(false);setEditModal(null);}}
                style={{background:"#e8eef5",border:"none",color:"#374151",borderRadius:9,padding:"9px 20px",fontSize:15}}>取消</button>
              <button onClick={()=>handleSave(!!editModal)}
                style={{background:"#1a6fb5",border:"none",color:"#fff",borderRadius:9,padding:"9px 20px",fontSize:15,fontWeight:700}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── HandoverChip ─────────────────────────────────────────────────────── */
function HandoverChip({h,onEdit,onDelete}){
  const [menu,setMenu]=useState(false);
  const ref=useRef();
  const pc=PRIORITY[h.priority]||PRIORITY.normal;
  useEffect(()=>{
    if(!menu)return;
    const handler=e=>{if(ref.current&&!ref.current.contains(e.target))setMenu(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[menu]);
  return(
    <div ref={ref} style={{position:"relative",flexShrink:0}}>
      <div onClick={()=>setMenu(v=>!v)}
        style={{background:"#fff",border:`1.5px solid ${pc.color}`,borderRadius:9,
          padding:"5px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:7,
          boxShadow:"0 1px 4px rgba(20,80,160,0.1)"}}>
        <span style={{background:pc.bg,color:pc.color,borderRadius:4,padding:"1px 7px",fontSize:12,fontWeight:700,flexShrink:0}}>{pc.label}</span>
        <span style={{color:"#1e3a5f",fontSize:15,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:180}}>{h.text}</span>
      </div>
      {menu&&(
        <div style={{position:"absolute",bottom:"100%",left:0,zIndex:150,background:"#fff",
          border:"1px solid #ccddf0",borderRadius:10,boxShadow:"0 4px 20px rgba(20,80,160,0.15)",minWidth:130,marginBottom:4}}>
          <button onClick={()=>{setMenu(false);onEdit(h);}}
            style={{display:"block",width:"100%",padding:"11px 16px",background:"none",border:"none",color:"#1e3a5f",textAlign:"left",fontSize:15,borderBottom:"1px solid #e8f0fa"}}>✏️ 再編輯</button>
          <button onClick={()=>{setMenu(false);onDelete(h.id);}}
            style={{display:"block",width:"100%",padding:"11px 16px",background:"none",border:"none",color:"#dc2626",textAlign:"left",fontSize:15}}>🗑️ 刪除</button>
          <button onClick={()=>setMenu(false)}
            style={{display:"block",width:"100%",padding:"8px 16px",background:"none",border:"none",color:"#94a3b8",textAlign:"left",fontSize:13}}>取消</button>
        </div>
      )}
    </div>
  );
}

/* ── HandoverBar ──────────────────────────────────────────────────────── */
function HandoverBar({handovers}){
  const [addModal,setAddModal]=useState(false);
  const [editModal,setEditModal]=useState(null);
  const [form,setForm]=useState({text:"",priority:"normal"});
  const items=Object.entries(handovers||{}).map(([id,v])=>({id,...v}));
  const handleSave=isEdit=>{
    if(!form.text.trim())return;
    if(isEdit){fbSet(`handovers/${editModal.id}`,{...editModal,text:form.text,priority:form.priority});setEditModal(null);}
    else{fbSet(`handovers/${Date.now()}`,{text:form.text,priority:form.priority,date:new Date().toLocaleDateString("zh-TW")});setAddModal(false);}
    setForm({text:"",priority:"normal"});
  };
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",borderTop:"3px solid #1a6fb5"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"7px 18px 6px",background:"#1a6fb5",flexShrink:0}}>
        <span style={{fontWeight:800,fontSize:16,color:"#fff",letterSpacing:1}}>📋 交班事項</span>
        <button onClick={()=>{setAddModal(true);setForm({text:"",priority:"normal"});}}
          style={{background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.5)",
            color:"#fff",borderRadius:7,padding:"4px 14px",fontSize:14,fontWeight:700}}>+ 新增</button>
      </div>
      <div style={{flex:1,overflowX:"auto",overflowY:"hidden",display:"flex",gap:10,
        padding:"7px 18px",alignItems:"center",background:"#eef4fb"}}>
        {items.length===0&&<span style={{color:"#94a3b8",fontSize:15}}>尚無交班事項</span>}
        {items.map(h=>(
          <HandoverChip key={h.id} h={h}
            onEdit={h=>{setEditModal(h);setForm({text:h.text,priority:h.priority});}}
            onDelete={id=>fbRemove(`handovers/${id}`)}/>
        ))}
      </div>
      {(addModal||editModal)&&(
        <Modal title={editModal?"編輯交班事項":"新增交班事項"} onClose={()=>{setAddModal(false);setEditModal(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(PRIORITY).map(([k,v])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,priority:k}))}
                  style={{background:form.priority===k?v.bg:"#e8eef5",border:`1.5px solid ${form.priority===k?v.color:"transparent"}`,
                    color:form.priority===k?v.color:"#374151",borderRadius:8,padding:"7px 14px",fontWeight:form.priority===k?700:400,fontSize:15}}>
                  {v.label}
                </button>
              ))}
            </div>
            <textarea autoFocus value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
              placeholder="輸入交班事項..." rows={3}
              style={{width:"100%",background:"#f5f8fc",border:"1px solid #b0c8e0",borderRadius:10,
                color:"#1e3a5f",padding:"10px 12px",fontSize:16,resize:"none"}}/>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>{setAddModal(false);setEditModal(null);}}
                style={{background:"#e8eef5",border:"none",color:"#374151",borderRadius:9,padding:"9px 20px",fontSize:15}}>取消</button>
              <button onClick={()=>handleSave(!!editModal)}
                style={{background:"#1a6fb5",border:"none",color:"#fff",borderRadius:9,padding:"9px 20px",fontSize:15,fontWeight:700}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── HandoverCard ─────────────────────────────────────────────────────── */
function HandoverCard({h,pc,onEdit,onDelete}){
  const [menu,setMenu]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!menu)return;
    const handler=e=>{if(ref.current&&!ref.current.contains(e.target))setMenu(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[menu]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setMenu(v=>!v)}
        style={{background:"#fff",borderLeft:`5px solid ${pc.color}`,borderRadius:10,
          padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:12,
          boxShadow:"0 1px 4px rgba(20,80,160,0.08)"}}>
        <span style={{background:pc.bg,color:pc.color,borderRadius:5,padding:"3px 9px",
          fontSize:13,fontWeight:700,flexShrink:0,marginTop:1}}>{pc.label}</span>
        <div style={{flex:1}}>
          <div style={{color:"#1e3a5f",fontSize:17,lineHeight:1.5}}>{h.text}</div>
          {h.date&&<div style={{color:"#94a3b8",fontSize:13,marginTop:4}}>{h.date}</div>}
        </div>
      </div>
      {menu&&(
        <div style={{position:"absolute",top:"100%",right:0,zIndex:100,background:"#fff",
          border:"1px solid #ccddf0",borderRadius:10,boxShadow:"0 4px 20px rgba(20,80,160,0.15)",minWidth:130}}>
          <button onClick={()=>{setMenu(false);onEdit();}}
            style={{display:"block",width:"100%",padding:"11px 16px",background:"none",border:"none",color:"#1e3a5f",textAlign:"left",fontSize:15,borderBottom:"1px solid #e8f0fa"}}>✏️ 再編輯</button>
          <button onClick={()=>{setMenu(false);onDelete();}}
            style={{display:"block",width:"100%",padding:"11px 16px",background:"none",border:"none",color:"#dc2626",textAlign:"left",fontSize:15}}>🗑️ 刪除</button>
          <button onClick={()=>setMenu(false)}
            style={{display:"block",width:"100%",padding:"8px 16px",background:"none",border:"none",color:"#94a3b8",textAlign:"left",fontSize:13}}>取消</button>
        </div>
      )}
    </div>
  );
}

/* ── HandoverTab ──────────────────────────────────────────────────────── */
function HandoverTab({handovers}){
  const [addModal,setAddModal]=useState(false);
  const [editModal,setEditModal]=useState(null);
  const [form,setForm]=useState({text:"",priority:"normal"});
  const items=Object.entries(handovers||{}).map(([id,v])=>({id,...v}))
    .sort((a,b)=>({urgent:0,important:1,normal:2}[a.priority]-({urgent:0,important:1,normal:2}[b.priority])));
  const handleSave=isEdit=>{
    if(!form.text.trim())return;
    if(isEdit){fbSet(`handovers/${editModal.id}`,{...editModal,text:form.text,priority:form.priority});setEditModal(null);}
    else{fbSet(`handovers/${Date.now()}`,{text:form.text,priority:form.priority,date:new Date().toLocaleDateString("zh-TW")});setAddModal(false);}
    setForm({text:"",priority:"normal"});
  };
  return(
    <div style={{padding:24,height:"100%",overflowY:"auto",background:"#f4f8fd"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={{fontWeight:800,fontSize:22,color:"#1e3a5f"}}>交班事項管理</div>
          <div style={{fontSize:15,color:"#64748b",marginTop:3}}>點選事項可進行編輯或刪除</div>
        </div>
        <button onClick={()=>{setAddModal(true);setForm({text:"",priority:"normal"});}}
          style={{background:"#1a6fb5",border:"none",color:"#fff",borderRadius:10,padding:"10px 20px",fontWeight:700,fontSize:16}}>+ 新增</button>
      </div>
      {items.length===0&&<div style={{textAlign:"center",color:"#94a3b8",padding:"50px 0",fontSize:17}}>尚無交班事項</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {items.map(h=>{
          const pc=PRIORITY[h.priority]||PRIORITY.normal;
          return <HandoverCard key={h.id} h={h} pc={pc}
            onEdit={()=>{setEditModal(h);setForm({text:h.text,priority:h.priority});}}
            onDelete={()=>fbRemove(`handovers/${h.id}`)}/>;
        })}
      </div>
      {(addModal||editModal)&&(
        <Modal title={editModal?"編輯交班事項":"新增交班事項"} onClose={()=>{setAddModal(false);setEditModal(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(PRIORITY).map(([k,v])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,priority:k}))}
                  style={{background:form.priority===k?v.bg:"#e8eef5",border:`1.5px solid ${form.priority===k?v.color:"transparent"}`,
                    color:form.priority===k?v.color:"#374151",borderRadius:8,padding:"7px 14px",fontWeight:form.priority===k?700:400,fontSize:15}}>
                  {v.label}
                </button>
              ))}
            </div>
            <textarea autoFocus value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
              placeholder="輸入交班事項..." rows={4}
              style={{width:"100%",background:"#f5f8fc",border:"1px solid #b0c8e0",borderRadius:10,
                color:"#1e3a5f",padding:"10px 12px",fontSize:16,resize:"none"}}/>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>{setAddModal(false);setEditModal(null);}}
                style={{background:"#e8eef5",border:"none",color:"#374151",borderRadius:9,padding:"9px 20px",fontSize:15}}>取消</button>
              <button onClick={()=>handleSave(!!editModal)}
                style={{background:"#1a6fb5",border:"none",color:"#fff",borderRadius:9,padding:"9px 20px",fontSize:15,fontWeight:700}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── App ──────────────────────────────────────────────────────────────── */
function App(){
  const [tab,setTab]=useState(0);
  const [fbReady,setFbReady]=useState(!!window._firebaseReady);
  const [events,setEvents]=useState({});
  const [recurringEvents,setRecurringEvents]=useState({});
  const [handovers,setHandovers]=useState({});

  useEffect(()=>{
    if(fbReady)return;
    const h=()=>setFbReady(true);
    window.addEventListener("firebaseReady",h);
    return()=>window.removeEventListener("firebaseReady",h);
  },[fbReady]);

  useEffect(()=>{
    if(!fbReady)return;
    const u1=fbListen("events",    v=>setEvents(v||{}));
    const u2=fbListen("recurring", v=>setRecurringEvents(v||{}));
    const u3=fbListen("handovers", v=>setHandovers(v||{}));
    return()=>{u1();u2();u3();};
  },[fbReady]);

  const TABS=["📅 行事曆","🔁 固定事項","📋 交班管理"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#eef4fb",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1565c0 0%,#0d47a1 100%)",
        borderBottom:"3px solid #0a3d91",padding:"0 24px",display:"flex",alignItems:"center",
        gap:16,flexShrink:0,height:76}}>
        <div style={{display:"flex",flexDirection:"column",lineHeight:1}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span style={{fontWeight:900,fontSize:44,color:"#fff",letterSpacing:3,
              textShadow:"0 2px 10px rgba(0,0,0,0.25)"}}>TPN</span>
            <span style={{fontWeight:800,fontSize:40,color:"#bfdbfe"}}>行事曆</span>
          </div>
          <span style={{fontSize:12,color:"rgba(255,255,255,0.55)",letterSpacing:2,marginTop:2}}>
            全靜脈營養藥物行事曆系統
          </span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:10}}>
          {fbReady
            ?<><span style={{width:10,height:10,borderRadius:"50%",background:"#4ade80",display:"inline-block",boxShadow:"0 0 6px #4ade80"}}/>
               <span style={{fontSize:13,color:"#bbf7d0"}}>已連線</span></>
            :<><span style={{width:10,height:10,borderRadius:"50%",background:"#fbbf24",display:"inline-block"}}/>
               <span style={{fontSize:13,color:"#fef3c7"}}>連線中…</span></>}
        </div>
        <div style={{display:"flex",gap:6,marginLeft:"auto"}}>
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)}
              style={{background:tab===i?"#ffffff":"rgba(255,255,255,0.18)",border:"none",
                color:tab===i?"#1565c0":"#ffffffdd",borderRadius:10,
                padding:"9px 22px",fontWeight:tab===i?800:500,fontSize:16,
                boxShadow:tab===i?"0 2px 10px rgba(0,0,0,0.2)":"none"}}>
              {t}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      {tab===0?(
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{flex:"0 0 75%",overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <CalendarTab events={events} recurringEvents={recurringEvents}/>
          </div>
          <div style={{flex:"0 0 25%",overflow:"hidden"}}>
            <HandoverBar handovers={handovers}/>
          </div>
        </div>
      ):tab===1?(
        <div style={{flex:1,overflow:"hidden"}}>
          <RecurringTab recurringEvents={recurringEvents}/>
        </div>
      ):(
        <div style={{flex:1,overflow:"hidden"}}>
          <HandoverTab handovers={handovers}/>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
