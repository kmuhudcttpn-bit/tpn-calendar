<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TPN 行事曆</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://tpn-calendar-bc4a7-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = db;
  window._ref = ref;
  window._onValue = onValue;
  window._set = set;
  window._remove = remove;
  window._firebaseReady = true;
  window.dispatchEvent(new Event("firebaseReady"));
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: #0a1322; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  textarea, input { outline: none; font-family: inherit; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const WEEKDAYS = ["一","二","三","四","五","六","日"];
const WD_COLOR  = { "六":"#3b82f6", "日":"#ef4444" };
const COLORS    = ["#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899"];
const PRIORITY  = {
  urgent:    { label:"緊急", color:"#ef4444", bg:"#450a0a" },
  important: { label:"重要", color:"#f59e0b", bg:"#451a03" },
  normal:    { label:"一般", color:"#0ea5e9", bg:"#082f49" },
};

function getWeekday(y,m,d){ return WEEKDAYS[(new Date(y,m-1,d).getDay()+6)%7]; }
function getDays(y,m){ return new Date(y,m,0).getDate(); }
function getFirstWD(y,m){ return (new Date(y,m-1,1).getDay()+6)%7; }

/* ── Firebase helpers ─────────────────────────────────────────────────── */
function fbSet(path, data){
  if(!window._db) return;
  window._set(window._ref(window._db, path), data);
}
function fbRemove(path){
  if(!window._db) return;
  window._remove(window._ref(window._db, path));
}
function fbListen(path, cb){
  if(!window._db) return ()=>{};
  const r = window._ref(window._db, path);
  const unsub = window._onValue(r, snap => cb(snap.val()));
  return unsub;
}

/* ── Modal ────────────────────────────────────────────────────────────── */
function Modal({ title, onClose, children }) {
  return (
    <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)"}}>
      <div style={{background:"#1e293b",border:"1.5px solid #334155",borderRadius:14,minWidth:320,maxWidth:430,width:"93vw",boxShadow:"0 8px 40px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"15px 20px 10px",borderBottom:"1px solid #334155"}}>
          <span style={{fontWeight:700,fontSize:16,color:"#e2e8f0"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",fontSize:22,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        <div style={{padding:"16px 20px 20px"}}>{children}</div>
      </div>
    </div>
  );
}

function ColorPicker({ value, onChange }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{color:"#94a3b8",fontSize:13}}>顏色：</span>
      {COLORS.map(c=>(
        <div key={c} onClick={()=>onChange(c)}
          style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",
            border:value===c?"3px solid #fff":"2px solid transparent",flexShrink:0}} />
      ))}
    </div>
  );
}

/* ── EventItem (calendar cell chip) ──────────────────────────────────── */
function EventItem({ event, onEdit, onDelete }) {
  const [menu, setMenu] = useState(false);
  const ref = useRef();

  useEffect(()=>{
    if(!menu) return;
    const handler = e => { if(ref.current && !ref.current.contains(e.target)) setMenu(false); };
    document.addEventListener("mousedown", handler);
    return ()=>document.removeEventListener("mousedown", handler);
  },[menu]);

  return (
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={e=>{e.stopPropagation();setMenu(v=>!v)}}
        style={{background:event.color||"#0ea5e9",color:"#fff",borderRadius:5,
          padding:"2px 6px",fontSize:11,marginBottom:2,cursor:"pointer",
          wordBreak:"break-all",lineHeight:1.5,fontWeight:500}}>
        {event.text}
      </div>
      {menu && (
        <div style={{position:"absolute",top:"100%",left:0,zIndex:100,background:"#1e293b",
          border:"1px solid #475569",borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",minWidth:110}}>
          <button onClick={()=>{setMenu(false);onEdit(event)}}
            style={{display:"block",width:"100%",padding:"8px 14px",background:"none",border:"none",
              color:"#e2e8f0",cursor:"pointer",textAlign:"left",fontSize:13,borderBottom:"1px solid #334155"}}>✏️ 再編輯</button>
          <button onClick={()=>{setMenu(false);onDelete(event.id)}}
            style={{display:"block",width:"100%",padding:"8px 14px",background:"none",border:"none",
              color:"#f87171",cursor:"pointer",textAlign:"left",fontSize:13}}>🗑️ 刪除</button>
          <button onClick={()=>setMenu(false)}
            style={{display:"block",width:"100%",padding:"6px 14px",background:"none",border:"none",
              color:"#64748b",cursor:"pointer",textAlign:"left",fontSize:12}}>取消</button>
        </div>
      )}
    </div>
  );
}

/* ── CalendarTab ──────────────────────────────────────────────────────── */
function CalendarTab({ year, month, setYear, setMonth, events, setEvents, recurringEvents }) {
  const [addModal, setAddModal]   = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [inputText, setInputText] = useState("");
  const [inputColor,setInputColor]= useState("#0ea5e9");

  const days    = getDays(year,month);
  const firstWD = getFirstWD(year,month);
  const cells   = [...Array(firstWD).fill(null), ...Array.from({length:days},(_,i)=>i+1)];
  while(cells.length%7!==0) cells.push(null);
  const weeks = Array.from({length:cells.length/7},(_,i)=>cells.slice(i*7,i*7+7));

  const today = new Date();

  const getEventsForDay = day => {
    if(!day) return [];
    const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const manual = Object.entries(events[key]||{}).map(([id,v])=>({id,...v}));
    const wd = getWeekday(year,month,day);
    const rec = Object.entries(recurringEvents||{})
      .map(([id,v])=>({id,...v}))
      .filter(r=>r.weekday===wd)
      .map(r=>({...r, id:`rec-${r.id}`, isRecurring:true}));
    return [...rec, ...manual];
  };

  const openAdd = day => { setAddModal({day}); setInputText(""); setInputColor("#0ea5e9"); };

  const handleAddSave = () => {
    if(!inputText.trim()) return;
    const key = `${year}-${String(month).padStart(2,'0')}-${String(addModal.day).padStart(2,'0')}`;
    const id  = Date.now().toString();
    fbSet(`events/${key}/${id}`, { text:inputText.trim(), color:inputColor });
    setAddModal(null);
  };

  const handleEditSave = () => {
    if(!inputText.trim()) return;
    const key = `${year}-${String(month).padStart(2,'0')}-${String(editModal.day).padStart(2,'0')}`;
    fbSet(`events/${key}/${editModal.event.id}`, { text:inputText.trim(), color:inputColor });
    setEditModal(null);
  };

  const handleDelete = (day, id) => {
    const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    fbRemove(`events/${key}/${id}`);
  };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      {/* Month nav */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:"1px solid #334155",flexShrink:0}}>
        <button onClick={()=>{if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1);}}
          style={{background:"#334155",border:"none",color:"#e2e8f0",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:16}}>‹</button>
        <span style={{fontWeight:700,fontSize:18,color:"#e2e8f0",minWidth:108,textAlign:"center"}}>{year} 年 {month} 月</span>
        <button onClick={()=>{if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1);}}
          style={{background:"#334155",border:"none",color:"#e2e8f0",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:16}}>›</button>
        <button onClick={()=>{setYear(today.getFullYear());setMonth(today.getMonth()+1);}}
          style={{marginLeft:"auto",background:"#0ea5e9",border:"none",color:"#fff",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>本月</button>
      </div>

      {/* Weekday header */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#0f172a",borderBottom:"1px solid #334155",flexShrink:0}}>
        {WEEKDAYS.map(wd=>(
          <div key={wd} style={{textAlign:"center",padding:"6px 0",fontWeight:700,fontSize:13,color:WD_COLOR[wd]||"#94a3b8"}}>{wd}</div>
        ))}
      </div>

      {/* Grid */}
      <div style={{flex:1,overflowY:"auto"}}>
        {weeks.map((week,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid #1e293b"}}>
            {week.map((day,di)=>{
              const isToday = day && year===today.getFullYear() && month===today.getMonth()+1 && day===today.getDate();
              const wd = day ? WEEKDAYS[di] : null;
              const evs = getEventsForDay(day);
              return (
                <div key={di} onClick={()=>day&&openAdd(day)}
                  style={{minHeight:70,padding:"4px",borderRight:di<6?"1px solid #1e293b":"none",
                    background:isToday?"#0c2340":day?"#131e2e":"#0a1322",cursor:day?"pointer":"default",position:"relative"}}>
                  {day && (
                    <div style={{fontWeight:isToday?800:500,fontSize:12,color:isToday?"#38bdf8":(WD_COLOR[wd]||"#cbd5e1"),marginBottom:3}}>
                      {isToday
                        ? <span style={{background:"#0ea5e9",color:"#fff",borderRadius:"50%",width:20,height:20,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11}}>{day}</span>
                        : day}
                    </div>
                  )}
                  <div onClick={e=>e.stopPropagation()}>
                    {evs.map(ev=>(
                      <EventItem key={ev.id} event={ev}
                        onEdit={ev.isRecurring?()=>{}:e=>{setEditModal({event:e,day});setInputText(e.text);setInputColor(e.color||"#0ea5e9");}}
                        onDelete={ev.isRecurring?()=>{}:id=>handleDelete(day,id)} />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {addModal && (
        <Modal title={`新增事項 — ${month}/${addModal.day}`} onClose={()=>setAddModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <textarea autoFocus value={inputText} onChange={e=>setInputText(e.target.value)}
              placeholder="輸入事項..." rows={3}
              style={{background:"#0f172a",border:"1px solid #475569",borderRadius:8,color:"#e2e8f0",padding:"8px 10px",fontSize:14,resize:"none",width:"100%"}} />
            <ColorPicker value={inputColor} onChange={setInputColor} />
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setAddModal(null)} style={{background:"#334155",border:"none",color:"#e2e8f0",borderRadius:8,padding:"8px 18px",cursor:"pointer"}}>取消</button>
              <button onClick={handleAddSave} style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:600}}>新增</button>
            </div>
          </div>
        </Modal>
      )}

      {editModal && (
        <Modal title={`編輯事項 — ${month}/${editModal.day}`} onClose={()=>setEditModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <textarea autoFocus value={inputText} onChange={e=>setInputText(e.target.value)}
              rows={3}
              style={{background:"#0f172a",border:"1px solid #475569",borderRadius:8,color:"#e2e8f0",padding:"8px 10px",fontSize:14,resize:"none",width:"100%"}} />
            <ColorPicker value={inputColor} onChange={setInputColor} />
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setEditModal(null)} style={{background:"#334155",border:"none",color:"#e2e8f0",borderRadius:8,padding:"8px 18px",cursor:"pointer"}}>取消</button>
              <button onClick={handleEditSave} style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:600}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── RecurringTab ─────────────────────────────────────────────────────── */
function RecurringTab({ recurringEvents, setRecurringEvents }) {
  const [addModal, setAddModal]   = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [form, setForm] = useState({weekday:"一",text:"",color:"#0ea5e9"});

  const items = Object.entries(recurringEvents||{}).map(([id,v])=>({id,...v}));

  const handleSave = (isEdit) => {
    if(!form.text.trim()) return;
    if(isEdit) {
      fbSet(`recurring/${editModal.id}`, form);
      setEditModal(null);
    } else {
      const id = Date.now().toString();
      fbSet(`recurring/${id}`, {...form});
      setAddModal(false);
    }
    setForm({weekday:"一",text:"",color:"#0ea5e9"});
  };

  return (
    <div style={{padding:20,height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div>
          <div style={{fontWeight:700,fontSize:17,color:"#e2e8f0"}}>固定週期事項</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>設定每週固定重複出現在行事曆的事項</div>
        </div>
        <button onClick={()=>{setAddModal(true);setForm({weekday:"一",text:"",color:"#0ea5e9"});}}
          style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:14}}>+ 新增</button>
      </div>

      {items.length===0 && <div style={{textAlign:"center",color:"#475569",padding:"40px 0",fontSize:14}}>尚無固定事項</div>}

      {WEEKDAYS.map(wd=>{
        const group = items.filter(r=>r.weekday===wd);
        if(!group.length) return null;
        return (
          <div key={wd} style={{marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,color:WD_COLOR[wd]||"#94a3b8",marginBottom:6}}>每週 {wd}</div>
            {group.map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,background:"#1e293b",borderRadius:8,padding:"10px 14px",marginBottom:6}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:r.color,flexShrink:0}} />
                <span style={{flex:1,color:"#e2e8f0",fontSize:14}}>{r.text}</span>
                <button onClick={()=>{setEditModal(r);setForm({weekday:r.weekday,text:r.text,color:r.color});}}
                  style={{background:"#334155",border:"none",color:"#94a3b8",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:12}}>編輯</button>
                <button onClick={()=>fbRemove(`recurring/${r.id}`)}
                  style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16}}>✕</button>
              </div>
            ))}
          </div>
        );
      })}

      {(addModal||editModal) && (
        <Modal title={editModal?"編輯固定事項":"新增固定事項"} onClose={()=>{setAddModal(false);setEditModal(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:13,color:"#94a3b8",marginBottom:6}}>星期</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {WEEKDAYS.map(wd=>(
                  <button key={wd} onClick={()=>setForm(f=>({...f,weekday:wd}))}
                    style={{background:form.weekday===wd?"#0ea5e9":"#334155",border:"none",
                      color:form.weekday===wd?"#fff":"#94a3b8",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontWeight:form.weekday===wd?700:400}}>
                    {wd}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:13,color:"#94a3b8",marginBottom:6}}>事項內容</div>
              <input autoFocus value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
                placeholder="輸入事項..." 
                style={{width:"100%",background:"#0f172a",border:"1px solid #475569",borderRadius:8,color:"#e2e8f0",padding:"8px 10px",fontSize:14}} />
            </div>
            <ColorPicker value={form.color} onChange={c=>setForm(f=>({...f,color:c}))} />
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setAddModal(false);setEditModal(null);}} style={{background:"#334155",border:"none",color:"#e2e8f0",borderRadius:8,padding:"8px 18px",cursor:"pointer"}}>取消</button>
              <button onClick={()=>handleSave(!!editModal)} style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:600}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── HandoverChip (bottom bar) ────────────────────────────────────────── */
function HandoverChip({ h, onEdit, onDelete }) {
  const [menu, setMenu] = useState(false);
  const ref = useRef();
  const pc = PRIORITY[h.priority]||PRIORITY.normal;

  useEffect(()=>{
    if(!menu) return;
    const handler = e=>{ if(ref.current&&!ref.current.contains(e.target)) setMenu(false); };
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[menu]);

  return (
    <div ref={ref} style={{position:"relative",flexShrink:0}}>
      <div onClick={()=>setMenu(v=>!v)}
        style={{background:"#1e293b",border:`1px solid ${pc.color}`,borderRadius:8,
          padding:"3px 10px",cursor:"pointer",maxWidth:220,display:"flex",alignItems:"center",gap:6}}>
        <span style={{color:pc.color,fontSize:10,fontWeight:700,flexShrink:0}}>{pc.label}</span>
        <span style={{color:"#cbd5e1",fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:160}}>{h.text}</span>
      </div>
      {menu && (
        <div style={{position:"absolute",bottom:"100%",left:0,zIndex:150,background:"#1e293b",
          border:"1px solid #475569",borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",minWidth:110,marginBottom:4}}>
          <button onClick={()=>{setMenu(false);onEdit(h);}}
            style={{display:"block",width:"100%",padding:"8px 14px",background:"none",border:"none",color:"#e2e8f0",cursor:"pointer",textAlign:"left",fontSize:13,borderBottom:"1px solid #334155"}}>✏️ 再編輯</button>
          <button onClick={()=>{setMenu(false);onDelete(h.id);}}
            style={{display:"block",width:"100%",padding:"8px 14px",background:"none",border:"none",color:"#f87171",cursor:"pointer",textAlign:"left",fontSize:13}}>🗑️ 刪除</button>
          <button onClick={()=>setMenu(false)}
            style={{display:"block",width:"100%",padding:"6px 14px",background:"none",border:"none",color:"#64748b",cursor:"pointer",textAlign:"left",fontSize:12}}>取消</button>
        </div>
      )}
    </div>
  );
}

/* ── HandoverBar (bottom 1/4 on calendar tab) ─────────────────────────── */
function HandoverBar({ handovers, setHandovers }) {
  const [addModal, setAddModal]   = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [form, setForm] = useState({text:"",priority:"normal"});

  const items = Object.entries(handovers||{}).map(([id,v])=>({id,...v}));

  const handleSave = isEdit => {
    if(!form.text.trim()) return;
    if(isEdit){
      fbSet(`handovers/${editModal.id}`, {...editModal, text:form.text, priority:form.priority});
      setEditModal(null);
    } else {
      const id = Date.now().toString();
      fbSet(`handovers/${id}`, {text:form.text, priority:form.priority, date:new Date().toLocaleDateString("zh-TW")});
      setAddModal(false);
    }
    setForm({text:"",priority:"normal"});
  };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",borderTop:"2px solid #0ea5e9"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 14px 4px",background:"#0c2340",flexShrink:0}}>
        <span style={{fontWeight:700,fontSize:13,color:"#38bdf8",letterSpacing:1}}>📋 交班事項</span>
        <button onClick={()=>{setAddModal(true);setForm({text:"",priority:"normal"});}}
          style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>+ 新增</button>
      </div>
      <div style={{flex:1,overflowX:"auto",overflowY:"hidden",display:"flex",gap:8,padding:"6px 14px",alignItems:"center"}}>
        {items.length===0 && <span style={{color:"#475569",fontSize:12}}>尚無交班事項</span>}
        {items.map(h=>(
          <HandoverChip key={h.id} h={h}
            onEdit={h=>{setEditModal(h);setForm({text:h.text,priority:h.priority});}}
            onDelete={id=>fbRemove(`handovers/${id}`)} />
        ))}
      </div>

      {(addModal||editModal) && (
        <Modal title={editModal?"編輯交班事項":"新增交班事項"} onClose={()=>{setAddModal(false);setEditModal(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(PRIORITY).map(([k,v])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,priority:k}))}
                  style={{background:form.priority===k?v.bg:"#334155",border:`1.5px solid ${form.priority===k?v.color:"transparent"}`,
                    color:form.priority===k?v.color:"#94a3b8",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontWeight:form.priority===k?700:400,fontSize:13}}>
                  {v.label}
                </button>
              ))}
            </div>
            <textarea autoFocus value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
              placeholder="輸入交班事項..." rows={3}
              style={{width:"100%",background:"#0f172a",border:"1px solid #475569",borderRadius:8,color:"#e2e8f0",padding:"8px 10px",fontSize:14,resize:"none"}} />
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setAddModal(false);setEditModal(null);}} style={{background:"#334155",border:"none",color:"#e2e8f0",borderRadius:8,padding:"8px 18px",cursor:"pointer"}}>取消</button>
              <button onClick={()=>handleSave(!!editModal)} style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:600}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── HandoverTab (tab 3) ──────────────────────────────────────────────── */
function HandoverTab({ handovers }) {
  const [addModal, setAddModal]   = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [form, setForm] = useState({text:"",priority:"normal"});

  const items = Object.entries(handovers||{}).map(([id,v])=>({id,...v}))
    .sort((a,b)=>{ const order={urgent:0,important:1,normal:2}; return order[a.priority]-order[b.priority]; });

  const handleSave = isEdit => {
    if(!form.text.trim()) return;
    if(isEdit){
      fbSet(`handovers/${editModal.id}`, {...editModal, text:form.text, priority:form.priority});
      setEditModal(null);
    } else {
      const id = Date.now().toString();
      fbSet(`handovers/${id}`, {text:form.text, priority:form.priority, date:new Date().toLocaleDateString("zh-TW")});
      setAddModal(false);
    }
    setForm({text:"",priority:"normal"});
  };

  return (
    <div style={{padding:20,height:"100%",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div>
          <div style={{fontWeight:700,fontSize:17,color:"#e2e8f0"}}>交班事項管理</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>點選事項可進行編輯或刪除</div>
        </div>
        <button onClick={()=>{setAddModal(true);setForm({text:"",priority:"normal"});}}
          style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:14}}>+ 新增</button>
      </div>

      {items.length===0 && <div style={{textAlign:"center",color:"#475569",padding:"40px 0",fontSize:14}}>尚無交班事項</div>}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {items.map(h=>{
          const pc = PRIORITY[h.priority]||PRIORITY.normal;
          return <HandoverCard key={h.id} h={h} pc={pc}
            onEdit={()=>{setEditModal(h);setForm({text:h.text,priority:h.priority});}}
            onDelete={()=>fbRemove(`handovers/${h.id}`)} />;
        })}
      </div>

      {(addModal||editModal) && (
        <Modal title={editModal?"編輯交班事項":"新增交班事項"} onClose={()=>{setAddModal(false);setEditModal(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(PRIORITY).map(([k,v])=>(
                <button key={k} onClick={()=>setForm(f=>({...f,priority:k}))}
                  style={{background:form.priority===k?v.bg:"#334155",border:`1.5px solid ${form.priority===k?v.color:"transparent"}`,
                    color:form.priority===k?v.color:"#94a3b8",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontWeight:form.priority===k?700:400,fontSize:13}}>
                  {v.label}
                </button>
              ))}
            </div>
            <textarea autoFocus value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
              placeholder="輸入交班事項..." rows={4}
              style={{width:"100%",background:"#0f172a",border:"1px solid #475569",borderRadius:8,color:"#e2e8f0",padding:"8px 10px",fontSize:14,resize:"none"}} />
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setAddModal(false);setEditModal(null);}} style={{background:"#334155",border:"none",color:"#e2e8f0",borderRadius:8,padding:"8px 18px",cursor:"pointer"}}>取消</button>
              <button onClick={()=>handleSave(!!editModal)} style={{background:"#0ea5e9",border:"none",color:"#fff",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:600}}>儲存</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function HandoverCard({ h, pc, onEdit, onDelete }) {
  const [menu, setMenu] = useState(false);
  const ref = useRef();
  useEffect(()=>{
    if(!menu) return;
    const handler = e=>{ if(ref.current&&!ref.current.contains(e.target)) setMenu(false); };
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[menu]);
  return (
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setMenu(v=>!v)}
        style={{background:"#1e293b",borderLeft:`4px solid ${pc.color}`,borderRadius:8,
          padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:10}}>
        <span style={{background:pc.bg,color:pc.color,borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700,flexShrink:0,marginTop:1}}>{pc.label}</span>
        <div style={{flex:1}}>
          <div style={{color:"#e2e8f0",fontSize:14,lineHeight:1.5}}>{h.text}</div>
          {h.date&&<div style={{color:"#475569",fontSize:11,marginTop:4}}>{h.date}</div>}
        </div>
      </div>
      {menu && (
        <div style={{position:"absolute",top:"100%",right:0,zIndex:100,background:"#1e293b",
          border:"1px solid #475569",borderRadius:8,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",minWidth:110}}>
          <button onClick={()=>{setMenu(false);onEdit();}}
            style={{display:"block",width:"100%",padding:"8px 14px",background:"none",border:"none",color:"#e2e8f0",cursor:"pointer",textAlign:"left",fontSize:13,borderBottom:"1px solid #334155"}}>✏️ 再編輯</button>
          <button onClick={()=>{setMenu(false);onDelete();}}
            style={{display:"block",width:"100%",padding:"8px 14px",background:"none",border:"none",color:"#f87171",cursor:"pointer",textAlign:"left",fontSize:13}}>🗑️ 刪除</button>
          <button onClick={()=>setMenu(false)}
            style={{display:"block",width:"100%",padding:"6px 14px",background:"none",border:"none",color:"#64748b",cursor:"pointer",textAlign:"left",fontSize:12}}>取消</button>
        </div>
      )}
    </div>
  );
}

/* ── App ──────────────────────────────────────────────────────────────── */
function App() {
  const today = new Date();
  const [year,  setYear]  = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth()+1);
  const [tab,   setTab]   = useState(0);
  const [fbReady, setFbReady] = useState(!!window._firebaseReady);

  const [events,         setEvents]         = useState({});
  const [recurringEvents,setRecurringEvents] = useState({});
  const [handovers,      setHandovers]       = useState({});

  useEffect(()=>{
    if(fbReady) return;
    const handler = ()=>setFbReady(true);
    window.addEventListener("firebaseReady", handler);
    return ()=>window.removeEventListener("firebaseReady", handler);
  },[fbReady]);

  useEffect(()=>{
    if(!fbReady) return;
    const u1 = fbListen("events",    v=>setEvents(v||{}));
    const u2 = fbListen("recurring", v=>setRecurringEvents(v||{}));
    const u3 = fbListen("handovers", v=>setHandovers(v||{}));
    return ()=>{ u1(); u2(); u3(); };
  },[fbReady]);

  const TABS = ["📅 行事曆","🔁 固定事項","📋 交班管理"];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#0a1322",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(90deg,#0c2340,#0a1322)",borderBottom:"2px solid #0ea5e9",
        padding:"10px 16px",display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
        <div>
          <span style={{fontWeight:900,fontSize:20,color:"#38bdf8",letterSpacing:2}}>TPN</span>
          <span style={{fontWeight:700,fontSize:18,color:"#e2e8f0",marginLeft:8}}>行事曆</span>
        </div>
        {!fbReady && <span style={{fontSize:12,color:"#f59e0b",marginLeft:8}}>⏳ 連線中...</span>}
        {fbReady  && <span style={{fontSize:12,color:"#10b981",marginLeft:8}}>● 已連線</span>}
        <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)}
              style={{background:tab===i?"#0ea5e9":"#1e293b",border:"none",color:tab===i?"#fff":"#94a3b8",
                borderRadius:8,padding:"6px 14px",cursor:"pointer",fontWeight:tab===i?700:400,fontSize:13}}>
              {t}
            </button>
          ))}
        </div>
      </div>

      {/* Content */}
      {tab===0 ? (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{flex:"0 0 75%",overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <CalendarTab year={year} month={month} setYear={setYear} setMonth={setMonth}
              events={events} setEvents={setEvents} recurringEvents={recurringEvents} />
          </div>
          <div style={{flex:"0 0 25%",overflow:"hidden"}}>
            <HandoverBar handovers={handovers} setHandovers={setHandovers} />
          </div>
        </div>
      ) : tab===1 ? (
        <div style={{flex:1,overflow:"hidden"}}>
          <RecurringTab recurringEvents={recurringEvents} setRecurringEvents={setRecurringEvents} />
        </div>
      ) : (
        <div style={{flex:1,overflow:"hidden"}}>
          <HandoverTab handovers={handovers} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
